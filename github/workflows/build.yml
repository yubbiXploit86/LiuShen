name: Build EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Debug file list
      run: |
        dir

    - name: Build EXE
      run: |
        pyinstaller --onefile --name Liushen Liushen.py

    - name: Check output
      run: |
        dir dist

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Liushen-exe
        path: dist/Liushen.exe
